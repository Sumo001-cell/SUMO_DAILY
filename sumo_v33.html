<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"/>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap&subset=vietnamese,latin" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>

<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors:{
        bg0:'#040C0A', bg1:'#06120F', bg2:'#091B17',
        glass:'rgba(255,255,255,0.03)',
        glass2:'rgba(255,255,255,0.05)',
        line1:'rgba(255,255,255,0.07)',
        line2:'rgba(255,255,255,0.04)',
        hi:'rgba(255,255,255,0.10)',
        g:'#22C55E', gd:'#16A34A', gl:'#4ADE80',
        gsoft:'rgba(34,197,94,0.10)',
        gline:'rgba(34,197,94,0.22)',
        warn:'#F59E0B', danger:'#EF4444',
        t1:'#F2F7F4', t2:'#9AAAA3', t3:'#5C6E68'
      },
      fontFamily:{
        display:['Plus Jakarta Sans','sans-serif'],
        body:['Inter','sans-serif'],
        mono:['JetBrains Mono','monospace']

<style>
*{-webkit-tap-highlight-color:transparent}
html,body{background:#040C0A;color:#F2F7F4;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;font-size:15px;line-height:1.5;overscroll-behavior:none;margin:0;padding:0}
body{min-height:100vh;position:relative;overflow-x:hidden;padding-bottom:108px}
.bg-atmos{position:fixed;inset:0;z-index:0;pointer-events:none;background:
  radial-gradient(1500px 800px at 50% -15%, rgba(34,197,94,0.20), transparent 55%),
  radial-gradient(1100px 600px at 100% 110%, rgba(22,163,74,0.10), transparent 60%),
  linear-gradient(180deg, #040C0A 0%, #06120F 50%, #091B17 100%)}
.bg-dots{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:radial-gradient(circle at 1px 1px, rgba(255,255,255,0.045) 1px, transparent 1.5px);
  background-size:24px 24px;
  mask-image:radial-gradient(ellipse 80% 65% at 50% 35%, #000 25%, transparent 80%);
  -webkit-mask-image:radial-gradient(ellipse 80% 65% at 50% 35%, #000 25%, transparent 80%)}
.card-after::after{content:"";position:absolute;left:0;right:0;top:0;height:1px;background:linear-gradient(90deg, transparent, rgba(255,255,255,0.10) 30%, rgba(255,255,255,0.10) 70%, transparent);pointer-events:none}
.tile-glass{background:linear-gradient(180deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.005) 100%);backdrop-filter:blur(24px) saturate(140%);-webkit-backdrop-filter:blur(24px) saturate(140%);box-shadow:0 1px 0 rgba(255,255,255,0.05) inset, 0 14px 40px rgba(0,0,0,0.45)}
.feat-bg{background:linear-gradient(135deg, rgba(34,197,94,0.14), rgba(22,163,74,0.04))}
.feat-bg::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at -10% 50%, rgba(34,197,94,0.16), transparent 55%);pointer-events:none}
.logo-grad{background:linear-gradient(140deg, #1F8E4A 0%, #16A34A 50%, #0B7A3A 100%);box-shadow:0 12px 30px rgba(22,163,74,0.45), inset 0 1px 0 rgba(255,255,255,0.32)}
.logo-grad::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 28% 22%, rgba(255,255,255,0.32), transparent 50%);pointer-events:none;border-radius:inherit}
.btn-grad{background:linear-gradient(135deg, #22C55E 0%, #16A34A 100%);box-shadow:0 8px 28px rgba(34,197,94,0.45), inset 0 1px 0 rgba(255,255,255,0.30)}
.mic-grad{background:linear-gradient(135deg, #22C55E 0%, #16A34A 100%);box-shadow:0 0 0 8px rgba(34,197,94,0.10), 0 18px 56px rgba(34,197,94,0.50), inset 0 2px 0 rgba(255,255,255,0.32)}
.lbl-after::after{content:"";flex:1;height:1px;background:linear-gradient(90deg, rgba(255,255,255,0.07), transparent);margin-left:6px}
.dot-pulse{animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(.78)}}
.fade-in{animation:fade .3s cubic-bezier(.22,1,.36,1)}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
input,select,textarea{font-family:inherit}
</style>
</head>
<body>

<div class="bg-atmos"></div>
<div class="bg-dots"></div>

<div id="root"></div>

// ═══ MASCOT (white silhouette) ═══
const Mascot = ({size=32}) => (
  <svg viewBox="0 0 100 100" fill="none" style={{width:size,height:size,position:'relative',zIndex:2}}>
    <path d="M50 8 C53 8 55 10 55 13 C55 16 53 19 50 19 C47 19 45 16 45 13 C45 10 47 8 50 8 Z M44 18 L56 18 L54 24 L46 24 Z" fill="#fff"/>
    <circle cx="50" cy="32" r="13" fill="#fff"/>
    <path d="M50 42 C32 42 22 52 22 65 C22 78 32 88 50 88 C68 88 78 78 78 65 C78 52 68 42 50 42 Z" fill="#fff"/>
    <ellipse cx="20" cy="62" rx="6.5" ry="11" fill="#fff" transform="rotate(-22 20 62)"/>
    <ellipse cx="80" cy="62" rx="6.5" ry="11" fill="#fff" transform="rotate(22 80 62)"/>
    <ellipse cx="38" cy="92" rx="7.5" ry="6" fill="#fff"/>
    <ellipse cx="62" cy="92" rx="7.5" ry="6" fill="#fff"/>
    <rect x="24" y="70" width="52" height="8" fill="#0B7A3A" rx="2"/>
    <rect x="46" y="78" width="8" height="10" fill="#0B7A3A" rx="1"/>
  </svg>
);

const HexLogo = ({size=50,mascotSize=32}) => (
  <div className="logo-grad relative grid place-items-center flex-shrink-0 overflow-hidden" style={{width:size,height:size,borderRadius:14}}>
    <Mascot size={mascotSize}/>
  </div>
);

// ═══ HEADER (sticky, present every screen) ═══
const Header = () => (
  <div className="sticky top-0 z-50 -mx-[18px] px-[18px] pt-[14px] pb-[12px] flex items-center justify-between" style={{background:'linear-gradient(180deg, rgba(4,12,10,0.95) 0%, rgba(4,12,10,0.80) 80%, transparent 100%)',backdropFilter:'blur(20px) saturate(140%)'}}>
    <div className="flex items-center gap-[13px]">
      <HexLogo size={50} mascotSize={32}/>
      <div>
        <div className="font-display font-extrabold text-[18px] tracking-tight text-white leading-none">SUMO</div>
        <div className="text-[11.5px] text-t2 mt-[5px] font-medium">Control Center</div>
      </div>
    </div>
    <div className="inline-flex items-center gap-[7px] py-[7px] px-[13px] rounded-full text-[12px] font-semibold text-gl" style={{background:'rgba(34,197,94,0.10)',border:'1px solid rgba(34,197,94,0.22)'}}>
      <span className="w-[6px] h-[6px] rounded-full bg-g dot-pulse" style={{boxShadow:'0 0 12px #22C55E'}}></span>Online
    </div>
  </div>
);

// ═══ Section label ═══
const SectionLabel = ({children}) => (
  <div className="text-[10.5px] tracking-[0.22em] font-bold text-t3 uppercase mx-1 mb-3 flex items-center gap-[10px] lbl-after">{children}</div>
);

// ═══ CONTROL ═══
const QC = ({featured,iconBg,icon,title,desc,onClick,extIcon}) => (
  <div onClick={onClick} className={`relative overflow-hidden flex items-center gap-[14px] p-[16px] rounded-[18px] cursor-pointer min-h-[78px] tile-glass card-after ${featured?'feat-bg':''}`} style={{border:featured?'1px solid rgba(34,197,94,0.32)':'1px solid rgba(255,255,255,0.07)'}}>
    <div className={`w-[46px] h-[46px] rounded-[13px] grid place-items-center flex-shrink-0 relative ${iconBg==='g'?'btn-grad':''}`} style={iconBg!=='g'?{background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.07)'}:{}}>
      {icon}
    </div>
    <div className="flex-1 min-w-0">
      <div className="font-display text-[15.5px] font-bold text-white tracking-tight leading-tight">{title}</div>
      <div className="text-[12.5px] text-t2 mt-[4px] leading-snug">{desc}</div>
    </div>
    {extIcon || <Ic.ArrR/>}
  </div>
);

const StatusRow = ({icon,name,status}) => (
  <div className="flex items-center gap-[13px] py-[13px] min-h-[46px]" style={{borderBottom:'1px solid rgba(255,255,255,0.04)'}}>
    <div className="w-[32px] h-[32px] rounded-[9px] grid place-items-center flex-shrink-0" style={{background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.07)'}}>{icon}</div>
    <div className="flex-1 text-[14px] font-semibold text-white">{name}</div>
    <div className="flex items-center gap-[7px] text-[12.5px] font-semibold text-gl">
      <span className="w-[17px] h-[17px] rounded-full bg-g grid place-items-center" style={{boxShadow:'0 0 0 3px rgba(34,197,94,0.15)'}}><Ic.Check/></span>
      {status}
    </div>
  </div>
);

const ControlScreen = ({setTab,now}) => (
  <div className="fade-in">

// ═══ APP ═══
const App = () => {
  const [tab,setTab]=useState('control');
  const [now,setNow]=useState('10:54 AM');
  useEffect(()=>{
    const tk=()=>{const d=new Date();let h=d.getHours();const m=String(d.getMinutes()).padStart(2,'0');const ap=h>=12?'PM':'AM';h=h%12||12;return String(h).padStart(2,'0')+':'+m+' '+ap};
    setNow(tk());
    const id=setInterval(()=>setNow(tk()),60000);
    return ()=>clearInterval(id);
  },[]);
  return (
    <div className="relative z-10 max-w-[430px] mx-auto px-[18px]">
      <Header/>
      {tab==='control' && <ControlScreen setTab={setTab} now={now}/>}
      {tab==='input' && <InputScreen/>}
      {tab==='reports' && <ReportsScreen/>}
      {tab==='settings' && <SettingsScreen/>}
      <BottomNav tab={tab} setTab={setTab}/>
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
